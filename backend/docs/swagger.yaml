info:
  contact: {}
  description: API do MVP Inbota.
  title: Inbota API
  version: "0.1"
paths:
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http_handler.HealthResponse'
      summary: Healthcheck (liveness)
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http_handler.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_http_handler.HealthResponse'
      summary: Readiness
  /v1/agenda:
    get:
      parameters:
      - description: Limite por tipo (events/tasks/reminders). Max 200.
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.AgendaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Listar agenda consolidada
      tags:
      - Agenda
  /v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http_handler.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - Auth
  /v1/auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Auth request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handler.AuthRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_http_handler.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar conta
      tags:
      - Auth
  /v1/context-rules:
    get:
      parameters:
      - description: Limite
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ListContextRulesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Listar regras de contexto
      tags:
      - ContextRules
    post:
      consumes:
      - application/json
      parameters:
      - description: Context rule payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/inbota_backend_internal_http_dto.CreateContextRuleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ContextRuleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Criar regra de contexto
      tags:
      - ContextRules
  /v1/context-rules/{id}:
    delete:
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remover regra de contexto
      tags:
      - ContextRules
    patch:
      consumes:
      - application/json
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      - description: Context rule payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/inbota_backend_internal_http_dto.UpdateContextRuleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ContextRuleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/inbota_backend_internal_http_dto.ErrorResponse'
