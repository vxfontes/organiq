name: inbota
description: "Inbox App."
publish_to: 'none'

version: 0.0.3+0000003 # 1.2.3 vira -> 0102003 / 11.20.30 vira -> 1120030

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  flutter_svg: ^2.0.10
  flutter_modular: ^6.3.4
  hugeicons: 1.1.5
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  dio: ^5.9.1
  pretty_dio_logger: ^1.3.1
  speech_to_text: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4
  json_serializable: ^6.8.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.svg
    - assets/app_icon.png

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
